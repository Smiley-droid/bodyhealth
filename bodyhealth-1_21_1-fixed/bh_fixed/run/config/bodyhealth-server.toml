[general]
	#Cœurs de départ par partie (défaut: 3)
	# Default: 3
	# Range: 1 ~ 20
	startingHearts = 3

[status_effects]
	enableNausea = true
	enableSlowness = true
	enableOffhandDrop = true
	enableBlockingDisable = true

[armor]
	enablePartialArmorSystem = true
	enableCrackedOverlay = true
	# Default: 2.0
	# Range: 0.5 ~ 10.0
	statusEffectThreshold = 2.0

[regeneration]
	#Régénération passive (très lente sans bandage/kit)
	enabled = true
	#HP/seconde passifs — défaut 0.02 = 1 cœur toutes les 50 secondes
	# Default: 0.02
	# Range: 0.001 ~ 2.0
	ratePerSecond = 0.02
	#Nécessite faim > 18 pour la regen passive
	requireFood = true

[food]
	#Multiplicateur de soin de la nourriture (défaut 0.4 = lent)
	# Default: 0.4
	# Range: 0.1 ~ 2.0
	foodHealMultiplier = 0.4
